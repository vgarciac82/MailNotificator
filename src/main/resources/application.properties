spring.application.name=AutomatedNotification
server.port=${SERVER_PORT:0}

# Eureka client
eureka.client.enabled=${EUREKA_ENABLED:true}
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

# Configuracion de base de datos H2 (En memoria) para la tabla de configuraciones
spring.datasource.url=jdbc:h2:mem:mailnotificator;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA y Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security - API KEY (cambiar en produccion via variable de entorno)
app.security.api-key=${API_KEY:axtel-sicove-secret-api-key}
